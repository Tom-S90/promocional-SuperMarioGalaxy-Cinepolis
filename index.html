<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Premiere Event</title>
    <style>
        :root {
            --primary-blue: #002d72;
            --accent-gold: #ffc400;
            --dark-bg: #0a0a0a;
            --text-light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            padding: 20px 5%;
            position: fixed;
            width: 90%;
            z-index: 1000;
        }

        .hero {
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: var(--accent-gold);
        }

        .container {
            max-width: 800px;
            margin: -50px auto 50px;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #0040a3;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <strong>PREMIERE PASS</strong>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>The Galaxy Awaits</h1>
            <p>Join us for an exclusive advance screening.</p>
        </div>
    </section>

    <div class="container">
        <h2>Reserve Your Seat</h2>
        <p>Complete the form below to receive your digital invitation and venue details.</p>
        
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Corporate Email</label>
                <input type="email" placeholder="email@company.com">
            </div>
            <button type="button" class="btn">Get My Invitation</button>
        </form>
    </div>

    <footer>
        &copy; 2026 Event Management Partners. All rights reserved.
    </footer>

</body>
</html>
