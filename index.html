<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinépolis - Rifa exclusiva - Super Mario Galaxy</title>
    <style>
        :root {
            --primary-blue: #002d72;
            --accent-gold: #ffc400;
            --dark-bg: #0a0a0a;
            --text-light: #f4f4f4;
            --danger-red: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 70px; /* Space for the sticky timer bar */
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* HEADER & LOGO */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 15px 5%;
            position: fixed;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            filter: brightness(1.3) contrast(1.1);
            height: auto;
            width: clamp(140px, 15vw, 200px); /* Responsive sizing: min, pref, max */
            display: block;
            transition: transform 0.2s;
        }
        
        .logo:hover { transform: scale(1.02); }

        /* HERO SECTION */
        .hero {
            height: 45vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('./image_2026-03-20_172606177.webp');
            background-size: cover;
            background-position: center;
        }

        .hero-content h1 {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            color: white;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
            margin: 0;
        }

        /* MAIN CONTENT LAYOUT */
        .main-wrapper {
            max-width: 1100px;
            margin: -50px auto 50px;
            padding: 0 20px;
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .container {
            flex: 1.8;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .poster-container {
            flex: 1;
            display: flex;
        }

        .poster-img {
            width: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
        
        .poster-img:hover { opacity: 0.9; }

        /* STICKY URGENCY BAR */
        .sticky-timer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--danger-red);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 0;
            z-index: 2000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            gap: 15px;
        }

        #countdown {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            background: rgba(0,0,0,0.3);
            padding: 2px 10px;
            border-radius: 4px;
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 850px) {
            .main-wrapper {
                flex-direction: column;
                margin-top: 20px;
            }

            .poster-container {
                order: -1; /* Poster on top for mobile */
            }

            .poster-img {
                height: 250px; /* Shorter poster for mobile mobile to save space */
            }
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="https://cinepolis.com/mx/detalle?cinema=cinepolis-vip-the-harbor-merida&selected=cinepolis-vip-the-harbor-merida&movie=super-mario-galaxy-la-pelicula">
            <img class="logo" src="./Cinépolis.svg.webp" alt="Cinépolis">
        </a>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>La Galaxia te espera</h1>
        </div>
    </section>

    <main class="main-wrapper">
        <div class="poster-container">
            <a href="https://cinepolis.com/mx/detalle?cinema=cinepolis-vip-the-harbor-merida&selected=cinepolis-vip-the-harbor-merida&movie=super-mario-galaxy-la-pelicula" style="width:100%">
                <img class="poster-img" src="./image_2026-03-20_172609665.webp" alt="Poster Promocional">
            </a>
        </div>

        <div class="container">
            <h2>¡Últimas entradas disponibles!</h2>
            <p>Participa ahora para ganar 2 boletos en <b>Cinépolis VIP The Harbor Mérida</b>. El sorteo es automático al finalizar el registro.</p>
            
            <iframe data-tally-src="https://tally.so/embed/5B20qv?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="320" frameborder="0" title="Formulario de Registro"></iframe>
            <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
        </div>
    </main>

    <div class="sticky-timer">
        <span>La oferta expira en:</span>
        <div id="countdown">04:59</div>
    </div>

    <footer>
        &copy; 2026 Cinépolis de México, S.A. de C.V. | <a href="#" style="color:#444">Aviso de Privacidad</a>
    </footer>

    <script>
        function startTimer(duration, display) {
            var timer = duration, minutes, seconds;
            var interval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(interval);
                    display.textContent = "00:00";
                    document.querySelector('.sticky-timer').style.background = "#555";
                }
            }, 1000);
        }

        window.onload = function () {
            var fiveMinutes = 60 * 5,
                display = document.querySelector('#countdown');
            startTimer(fiveMinutes, display);
        };
    </script>
</body>
</html>
